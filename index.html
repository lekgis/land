<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>แอปวัดที่ดิน อ.เล็ก</title>
    
    <!-- ✅ Meta Tags สำหรับ PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="วัดที่ดิน">
    <meta name="theme-color" content="#3b82f6">
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/x-icon" href="icons/lm.ico">
    <link rel="apple-touch-icon" href="icons/lm.ico">
    
    <!-- ✅ Dependencies -->
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- ✅ OpenLayers -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v10.3.1/ol.css">
    <script src="https://cdn.jsdelivr.net/npm/ol@v10.3.1/dist/ol.js"></script>
    
    <!-- ✅ เชื่อมต่อไฟล์ CSS แยก -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="map">
        <div class="watermark">อ.เล็ก lekgis</div>
        
        <div id="popup" class="ol-popup">
            <a href="#" id="popup-closer" class="popup-closer">×</a>
            <div id="popup-content"></div>
        </div>
        
        <div id="crosshair">
            <svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="2.5" fill="white"/>
                <circle cx="50" cy="50" r="26" stroke="white" stroke-width="3"/>
                <path d="M50 0V24M50 76V100M0 50H24M76 50H100" stroke="white" stroke-width="3" stroke-linecap="round"/>
            </svg>
        </div>
        
        <!-- PWA Install UI -->
        <div id="pwa-install-container" style="display:none; position:fixed; bottom:100px; left:50%; transform:translateX(-50%); z-index:9999;">
            <button id="pwa-install-btn" class="bg-blue-600 text-white px-8 py-4 rounded-full shadow-2xl font-bold flex items-center gap-2 animate-bounce">
                <span class="text-xl">📲</span>
                <div class="text-center leading-tight">
                    <span class="block">ติดตั้งแอป</span>
                    <span class="block">วัดที่ดิน อ.เล็ก</span>
                </div>
            </button>
        </div>

        <!-- ปุ่มตำแหน่งปัจจุบัน -->
        <div class="location-container">
            <button onclick="zoomToCurrentLocation()" class="ai-record-btn" id="locationBtn" title="ซูมไปยังตำแหน่งฉัน">
                <div class="record-circle"></div>
            </button>
        </div>

        <!-- ✅ (เสริม) แสดงพิกัดปัจจุบัน -->
        <div id="coord-display" class="absolute bottom-20 left-4 z-[1001] px-3 py-1.5 bg-transparent rounded-lg text-xs font-mono text-white hidden">
            กำลังโหลด...
        </div>

        <!-- กลุ่มปุ่มซ้ายบน -->
        <div class="tool-group-left">
            <div id="measureLineBtn" onclick="toggleMeasure('LineString')" class="ai-tool-btn" title="วัดระยะ">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="transform: rotate(45deg);">
                    <rect x="3" y="9" width="18" height="6" rx="1" />
                    <line x1="6" y1="9" x2="6" y2="11" />
                    <line x1="9" y1="9" x2="9" y2="12" />
                    <line x1="12" y1="9" x2="12" y2="11" />
                    <line x1="15" y1="9" x2="15" y2="12" />
                    <line x1="18" y1="9" x2="18" y2="11" />
                </svg>
            </div>
            <div id="measureAreaBtn" onclick="toggleMeasure('Polygon')" class="ai-tool-btn" title="วัดพื้นที่">
                <svg class="icon-area" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path class="land-border" d="M12 2 L22 9 L18 21 L6 21 L2 9 Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" />
                    <circle cx="12" cy="2" r="2" fill="white" stroke="currentColor" stroke-width="1" />
                    <circle cx="22" cy="9" r="2" fill="white" stroke="currentColor" stroke-width="1" />
                    <circle cx="18" cy="21" r="2" fill="white" stroke="currentColor" stroke-width="1" />
                    <circle cx="6" cy="21" r="2" fill="white" stroke="currentColor" stroke-width="1" />
                    <circle cx="2" cy="9" r="2" fill="white" stroke="currentColor" stroke-width="1" />
                </svg>
            </div>
        </div>
        
        <!-- กลุ่มปุ่มขวาบน -->
        <div class="tool-group-right">
            <label for="geojsonInput" class="ai-tool-btn" title="เปิดแผนที่ GeoJSON">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M9 20L3 17V4L9 7M9 20L15 17M9 20V7M15 17L21 20V7L15 4M15 17V4M9 7L15 4"></path>
                </svg>
            </label>
            <input type="file" id="geojsonInput" accept=".geojson,.json" multiple>
            
            <label for="folderInput" class="ai-tool-btn" title="เปิดภาพถ่ายโดรน">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"></path>
                </svg>
            </label>
            <input type="file" id="folderInput" webkitdirectory directory>
            
            <!-- ✅ ปุ่มสนับสนุน (ใช้รูปภาพ pay.png) -->
            <button onclick="openSupportModal()" class="support-btn" title="สนับสนุนผู้พัฒนา">
                <img src="https://raw.githubusercontent.com/lekgis/land/main/icons/pay.png" 
                     alt="สนับสนุน"
                     onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%23475569%22 stroke-width=%221.5%22%3E%3Ccircle cx=%2212%22 cy=%2212%22 r=%229%22/%3E%3Cpath d=%22M12 8v8M9 12h6%22/%3E%3C/svg%3E'">
            </button>
        </div>
        
        <!-- ปุ่มตกลง -->
        <div id="confirmContainer" class="confirm-btn-container">
            <button onclick="finishMeasurement()" class="confirm-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                ตกลง
            </button>
        </div>
        
        <!-- ปุ่มวาด (Undo/Add) -->
        <div id="drawControls" class="draw-controls">
            <button onclick="undoPoint()" class="w-11 h-11 rounded-xl bg-white flex items-center justify-center shadow-lg border border-slate-200">
                <svg class="w-6 h-6 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                    <path d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"></path>
                </svg>
            </button>
            <button onclick="addPointAtCrosshair()" class="ai-fab-add">
                <svg width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="3">
                    <path d="M12 4v16m8-8H4" />
                </svg>
            </button>
        </div>
        
        <!-- ✅ Modal สนับสนุนผู้พัฒนา -->
        <div id="supportModal">
            <div class="support-modal-content">
                <span class="support-modal-close" onclick="closeSupportModal()">&times;</span>
                <div class="support-modal-title">💛 สนับสนุนผู้พัฒนา</div>
                
                <div class="support-qrcode">
                    <img id="supportQRImage" 
                         src="https://raw.githubusercontent.com/lekgis/land/main/icons/qrcode.png" 
                         alt="QR Code สำหรับสนับสนุน"
                         onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22%3E%3Crect fill=%22%23f1f5f9%22 width=%22200%22 height=%22200%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%2364748b%22 font-size=%2214%22%3EQR Code ไม่พบ%3C/text%3E%3C/svg%3E'">
                </div>
                
                <div class="support-text">
                    <span class="support-text-line1">1 บาท 5 บาท 10 บาท มีค่าสำหรับผู้พัฒนา</span>
                    <span>คนบ้านกุดชุมแสง</span>
                    <span>ขอบพระคุณท่านที่สนับสนุน 🙏</span>
                </div>
                
                <button onclick="saveQRCode()" class="support-btn-save">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5 5-5-5M12 3v12"/>
                    </svg>
                    บันทึก qrcode
                </button>
            </div>
        </div>
    </div>

    <!-- ✅ เชื่อมต่อ JavaScript (ลำดับสำคัญ!) -->
    <script src="js/pwa.js"></script>
    <script src="js/support.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
